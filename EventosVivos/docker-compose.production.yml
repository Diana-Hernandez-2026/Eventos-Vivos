services:
  eventosvivos:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "${ConnectionStrings__DefaultConnection}"
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: EventosVivos
      JwtSettings__Audience: EventosVivosClients
      OAuth__Microsoft__ClientId: "${MICROSOFT_CLIENT_ID}"
      OAuth__Microsoft__ClientSecret: "${MICROSOFT_CLIENT_SECRET}"
      OAuth__Microsoft__TenantId: "${MICROSOFT_TENANT_ID}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/swagger/v1/swagger.json > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
