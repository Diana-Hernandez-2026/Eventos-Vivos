<div class="page">
    <h1>Gestión de Reservas</h1>

    <div class="card">
        <h2>Buscar Reserva por ID</h2>
        <div class="row">
            <input [(ngModel)]="reservationId" placeholder="UUID de la reserva...">
            <button (click)="confirmPayment()" [disabled]="!reservationId || loading">✅ Confirmar Pago</button>
            <button class="danger" (click)="cancelReservation()" [disabled]="!reservationId || loading">❌
                Cancelar</button>
        </div>
        <div *ngIf="result" class="result-card">
            <pre>{{ result | json }}</pre>
        </div>
        <div *ngIf="error" class="error">{{ error }}</div>
    </div>
</div>
